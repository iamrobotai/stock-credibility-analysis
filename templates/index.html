<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>
/* 主题初始化：优先 localStorage，否则跟随系统偏好，避免页面闪烁 */
(function () {
  try {
    var t = localStorage.getItem('sca-theme');
    if (t !== 'light' && t !== 'dark') {
      t = (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>股票可信度分析系统 v2.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; color: #58a6ff; }
.header .badge { background: #238636; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.card h2 { font-size: 16px; color: #58a6ff; margin-bottom: 16px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
  padding: 10px 12px; border-radius: 6px; font-size: 14px;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: #58a6ff; }
.btn {
  background: #238636; color: #fff; border: none; padding: 10px 24px;
  border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #2ea043; }
.btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
.btn-secondary:hover { background: #30363d; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.progress { background: #21262d; border-radius: 6px; height: 8px; overflow: hidden; margin: 12px 0; }
.progress-bar { background: #238636; height: 100%; transition: width 0.3s; }
.log { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px;
  height: 300px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.6; }
.log .ok { color: #3fb950; }
.log .fail { color: #f85149; }
.log .info { color: #58a6ff; }
.log .warn { color: #d29922; }
.stats { display: flex; gap: 16px; margin: 16px 0; }
.stat { background: #21262d; border-radius: 6px; padding: 12px 16px; text-align: center; flex: 1; }
.stat .num { font-size: 24px; font-weight: bold; color: #58a6ff; }
.stat .label { font-size: 12px; color: #8b949e; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table th { text-align: left; padding: 8px; border-bottom: 1px solid #30363d; color: #8b949e; }
table td { padding: 8px; border-bottom: 1px solid #21262d; }
.result-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #21262d; }
.result-item .name { color: #c9d1d9; }
.result-item .status { font-size: 12px; padding: 2px 8px; border-radius: 4px; }
.result-item .status.ok { background: #23863620; color: #3fb950; }
.result-item .status.fail { background: #f8514920; color: #f85149; }
.result-item .status.pending { background: #d2992220; color: #d29922; }
.actions { display: flex; gap: 12px; margin-top: 16px; }
.file-link { color: #58a6ff; text-decoration: none; }
.file-link:hover { text-decoration: underline; }

/* 平台选择 */
.platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.platform-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: #0d1117; border: 1px solid #30363d; border-radius: 6px; cursor: pointer;
  transition: border-color 0.2s;
}
.platform-item:hover { border-color: #58a6ff; }
.platform-item.checked { border-color: #238636; background: #23863610; }
.platform-item input { margin: 0; }
.platform-item .cat-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: auto;
}
.cat-tag.core { background: #58a6ff20; color: #58a6ff; }
.cat-tag.high { background: #23863620; color: #3fb950; }
.cat-tag.emotional { background: #d2992220; color: #d29922; }
.platform-item .plat-label { font-size: 13px; color: #c9d1d9; }
.platform-item .plat-desc { font-size: 11px; color: #8b949e; }

/* AI 提供商 */
.ai-provider-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.ai-status { font-size: 12px; padding: 2px 8px; border-radius: 4px; }
.ai-status.ok { background: #23863620; color: #3fb950; }
.ai-status.fail { background: #f8514920; color: #f85149; }
.ai-status.pending { background: #d2992220; color: #d29922; }
.model-select-hint { font-size: 11px; color: #8b949e; margin-top: 4px; }

.resolve-result { font-size: 13px; color: #3fb950; margin-top: 4px; }
.resolve-result.error { color: #f85149; }

.toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.toggle-row input[type="checkbox"] { width: 16px; height: 16px; }
.toggle-row label { font-size: 13px; color: #c9d1d9; cursor: pointer; }

/* 热门推荐 */
.hot-section { margin-bottom: 16px; }
.hot-tabs { display: flex; gap: 4px; margin-bottom: 10px; align-items: center; }
.hot-tab { padding: 6px 14px; font-size: 13px; border-radius: 6px; cursor: pointer;
  background: #21262d; color: #8b949e; border: 1px solid #30363d; transition: all 0.2s; }
.hot-tab.active { background: #238636; color: #fff; border-color: #238636; }
.hot-tab:hover { border-color: #58a6ff; }
.hot-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; max-height: 200px; overflow-y: auto; }
.hot-item { display: flex; align-items: center; gap: 6px; padding: 6px 10px;
  background: #0d1117; border: 1px solid #30363d; border-radius: 6px; cursor: pointer;
  transition: all 0.15s; font-size: 12px; }
.hot-item:hover { border-color: #58a6ff; background: #58a6ff10; }
.hot-item .hot-code { color: #8b949e; font-size: 11px; }
.hot-item .hot-name { color: #c9d1d9; font-weight: 500; }
.hot-item .hot-change { margin-left: auto; font-size: 11px; font-weight: bold; }
.hot-change.up { color: #f85149; }
.hot-change.down { color: #3fb950; }
.hot-item .hot-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #30363d; color: #8b949e; }
.hot-update { font-size: 11px; color: #8b949e; margin-top: 6px; }
.hot-refresh { font-size: 11px; color: #58a6ff; cursor: pointer; margin-left: 8px; }
.hot-refresh:hover { text-decoration: underline; }

/* 预览模态框 */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: flex-start; padding: 20px; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; max-width: 1000px; width: 100%; margin: 20px auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #30363d; position: sticky; top: 0; background: #161b22; border-radius: 12px 12px 0 0; z-index: 10; }
.modal-header h2 { font-size: 18px; color: #58a6ff; }
.modal-close { font-size: 24px; color: #8b949e; cursor: pointer; background: none; border: none; }
.modal-close:hover { color: #f85149; }
.modal-body { padding: 24px; }
.preview-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.preview-tab { padding: 6px 14px; font-size: 13px; border-radius: 6px; cursor: pointer;
  background: #21262d; color: #8b949e; border: 1px solid #30363d; transition: all 0.2s; }
.preview-tab.active { background: #238636; color: #fff; border-color: #238636; }
.preview-tab:hover { border-color: #58a6ff; }
.preview-section { display: none; }
.preview-section.active { display: block; }
.preview-chart { width: 100%; border-radius: 8px; border: 1px solid #30363d; }
.preview-stat { display: inline-block; background: #21262d; border-radius: 6px; padding: 8px 14px; margin: 4px; }
.preview-stat .val { font-size: 18px; font-weight: bold; color: #58a6ff; }
.preview-stat .lbl { font-size: 11px; color: #8b949e; }
.d-score { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin: 2px; }
.d-score.high { background: #23863620; color: #3fb950; }
.d-score.mid { background: #d2992220; color: #d29922; }
.d-score.low { background: #f8514920; color: #f85149; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
.preview-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 11px; }
.preview-table td { padding: 6px 8px; border-bottom: 1px solid #21262d; }
.ad-row { background: #f8514910; }
.callout-box { padding: 12px 16px; border-radius: 8px; margin: 12px 0; }
.callout-box.warn { background: #FFF2F0; border: 1px solid #C00000; color: #C00000; }
.callout-box.info { background: #FFFEF0; border: 1px solid #B8860B; color: #8B6914; }

/* 行业对比 */
.industry-section { margin-bottom: 16px; }
.industry-stock-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; max-height: 150px; overflow-y: auto; }
.industry-stock-item { display: flex; align-items: center; gap: 6px; padding: 4px 8px;
  background: #0d1117; border: 1px solid #30363d; border-radius: 4px; font-size: 12px; cursor: pointer; }
.industry-stock-item:hover { border-color: #58a6ff; }
.industry-stock-item.selected { border-color: #238636; background: #23863610; }
</style>

<body>
<div class="header">
  <h1>📊 股票可信度分析系统 v2.6</h1>
  <span style="display:flex;align-items:center;gap:12px">
    <span class="badge">雪球 · 知乎 · 增量更新 · 浏览器抓取</span>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换浅色/暗色主题">🌙 暗色</button>
  </span>
</div>

<div class="container">
  <div class="grid">
    <!-- 左侧 -->
    <div>
      <!-- 热门推荐 -->
      <div class="card hot-section">
        <h2>🔥 实时热门推荐</h2>
        <div class="hot-tabs">
          <div class="hot-tab active" onclick="switchHotTab('stocks', event)">热门个股</div>
          <div class="hot-tab" onclick="switchHotTab('industries', event)">热门行业</div>
          <div class="hot-refresh" onclick="loadHotData(true)">↻ 刷新</div>
        </div>
        <div class="hot-grid" id="hot-grid">
          <div style="color:#8b949e;grid-column:span 3;text-align:center;padding:20px">加载中...</div>
        </div>
        <div class="hot-update" id="hot-update">--</div>
      </div>

      <!-- 分析任务 -->
      <div class="card">
        <h2>🔧 分析任务</h2>
        <div class="form-group">
          <label>模式</label>
          <select id="mode" onchange="toggleMode()">
            <option value="single">单只股票</option>
            <option value="batch">批量（自定义列表）</option>
            <option value="industry">行业全量（20行业×9公司）</option>
          </select>
        </div>

        <div id="single-mode">
          <div class="form-group">
            <label>股票代码 <span style="color:#8b949e">(输入代码后点击解析)</span></label>
            <div style="display:flex; gap:8px">
              <input type="text" id="stock_code" placeholder="如 002371" value="002371" style="flex:1">
              <button class="btn btn-sm btn-secondary" onclick="resolveStock()">🔍 解析</button>
            </div>
            <div id="resolve-result" class="resolve-result"></div>
          </div>
          <div class="form-group">
            <label>股票名称</label>
            <input type="text" id="stock_name" placeholder="自动填充或手动输入" value="">
          </div>
          <div class="form-group">
            <label>所属行业</label>
            <input type="text" id="stock_industry" placeholder="自动填充或手动输入" value="">
          </div>
        </div>

        <div id="batch-mode" style="display:none">
          <div class="form-group">
            <label>股票列表 JSON <span style="color:#8b949e">(仅需 code，name/industry 可留空自动解析)</span></label>
            <textarea id="batch_config" rows="4" placeholder='[{"code":"002371"},{"code":"300308"}]'></textarea>
          </div>
          <button class="btn btn-sm btn-secondary" onclick="resolveBatch()">🔍 批量解析名称/行业</button>
        </div>

        <div class="actions">
          <button class="btn" id="run-btn" onclick="runAnalysis()">▶ 开始分析</button>
          <button class="btn btn-secondary" onclick="stopAnalysis()">⏹ 停止</button>
        </div>
      </div>

      <!-- AI 提供商 -->
      <div class="card" style="margin-top:20px">
        <h2>🤖 AI 提供商</h2>
        <div class="form-group">
          <label>选择 AI</label>
          <select id="ai_provider" onchange="onAIChange()">
            <option value="ollama">Ollama (本地, 零Token)</option>
            <option value="lmstudio">LM Studio (本地, 零Token)</option>
            <option value="deepseek">DeepSeek</option>
            <option value="qwen">通义千问</option>
            <option value="openai">OpenAI</option>
            <option value="zhipu">智谱 GLM</option>
          </select>
        </div>
        <div class="form-group">
          <label>模型 <span id="model-hint" style="color:#8b949e;font-size:11px"></span></label>
          <div style="display:flex; gap:8px">
            <input type="text" id="ai_model" placeholder="模型名称" value="qwen3:4b" style="flex:1" onchange="document.getElementById('ai_model').dataset.userModified='1'">
            <button class="btn btn-sm btn-secondary" id="detect-models-btn" onclick="detectModels()" style="display:none">🔍 检测模型</button>
          </div>
          <select id="ai_model_select" style="display:none; margin-top:4px" onchange="selectDetectedModel()"></select>
        </div>
        <div class="form-group" id="ai_key_group">
          <label>API Key</label>
          <input type="password" id="ai_key" placeholder="输入 API Key (本地 AI 无需)">
        </div>
        <div class="ai-provider-row">
          <button class="btn btn-sm btn-secondary" onclick="testAI()">🔌 测试连接</button>
          <button class="btn btn-sm btn-secondary" onclick="saveAIConfig()">💾 保存配置</button>
          <span id="ai-test-result" class="ai-status pending">未测试</span>
        </div>
        <div class="form-group" style="margin-top:10px">
          <label>LLM 增强</label>
          <select id="use_llm">
            <option value="1">启用 LLM 深度分析</option>
            <option value="0">禁用（仅规则评分）</option>
          </select>
        </div>
      </div>

      <!-- 数据源平台 -->
      <div class="card" style="margin-top:20px">
        <h2>📡 数据源平台</h2>
        <div class="toggle-row">
          <input type="checkbox" id="filter_emotion" checked>
          <label for="filter_emotion">过滤情绪帖（减少股吧/淘股吧中的喊单帖）</label>
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="use_browser" checked>
          <label for="use_browser">启用浏览器抓取（雪球讨论帖/知乎，需安装 Playwright）</label>
          <button class="btn btn-sm btn-secondary" onclick="testBrowserFetch()" style="margin-left:8px">🔍 检测</button>
          <span id="browser-test-result" class="ai-status pending" style="margin-left:4px">未检测</span>
        </div>
        <div class="toggle-row">
          <input type="checkbox" id="incremental_mode">
          <label for="incremental_mode">增量更新（仅获取新数据，合并已有数据，不重复抓取）</label>
          <button class="btn btn-sm btn-secondary" onclick="showIncrementalState()" style="margin-left:8px">📋 查看</button>
        </div>
        <div class="form-group" style="margin-top:10px">
          <label>数据保存路径 <span style="color:#8b949e;font-size:11px">(默认: data/ 目录)</span></label>
          <div style="display:flex; gap:8px">
            <input type="text" id="data_savepath" placeholder="留空使用默认路径" value="" style="flex:1">
            <button class="btn btn-sm btn-secondary" onclick="loadSavePath()">📂 加载</button>
            <button class="btn btn-sm btn-secondary" onclick="setSavePath()">💾 设置</button>
          </div>
          <div id="savepath-hint" style="font-size:11px;color:#8b949e;margin-top:4px">点击「加载」查看当前路径</div>
        </div>
        <div class="toggle-row" style="margin-top:10px">
          <button class="btn btn-sm btn-secondary" onclick="selectAllPlatforms(true)">全选</button>
          <button class="btn btn-sm btn-secondary" onclick="selectAllPlatforms(false)">全不选</button>
          <button class="btn btn-sm btn-secondary" onclick="selectHighValue()">仅高价值</button>
        </div>
        <div class="platform-grid" id="platform-grid"></div>
      </div>

      <!-- 统计 -->
      <div class="card" style="margin-top:20px">
        <h2>📈 统计</h2>
        <div class="stats">
          <div class="stat"><div class="num" id="stat-total">0</div><div class="label">已分析</div></div>
          <div class="stat"><div class="num" id="stat-success">0</div><div class="label">成功</div></div>
          <div class="stat"><div class="num" id="stat-fail">0</div><div class="label">失败</div></div>
          <div class="stat"><div class="num" id="stat-time">0s</div><div class="label">耗时</div></div>
        </div>
      </div>
    </div>

    <!-- 右侧 -->
    <div>
      <div class="card">
        <h2>📋 执行日志</h2>
        <div class="progress" style="display:none" id="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
        <div class="log" id="log-area">
          <div class="info">系统就绪。选择模式并点击「开始分析」。</div>
        </div>
      </div>

      <div class="card" style="margin-top:20px">
        <h2>📄 分析结果</h2>
        <div id="results-area">
          <div style="color:#8b949e; text-align:center; padding:20px">暂无结果</div>
        </div>
      </div>

      <!-- 行业走势对比 -->
      <div class="card" style="margin-top:20px">
        <h2>📊 行业走势对比</h2>
        <div class="form-group">
          <label>选择股票进行叠加对比（点击勾选）</label>
          <button class="btn btn-sm btn-secondary" onclick="loadIndustryStocks()">🔄 加载已分析股票</button>
          <button class="btn btn-sm btn-secondary" onclick="generateIndustryChart()" style="margin-left:8px">📈 生成对比图</button>
        </div>
        <div class="industry-stock-grid" id="industry-stock-grid">
          <div style="color:#8b949e;grid-column:span 3;text-align:center;padding:10px">点击「加载已分析股票」</div>
        </div>
        <div id="industry-chart-area" style="margin-top:12px;display:none">
          <img id="industry-chart-img" style="width:100%;border-radius:8px;border:1px solid #30363d" />
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 预览模态框 -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="preview-title">分析预览</h2>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn btn-sm btn-secondary" id="preview-excel-btn" onclick="downloadPreviewExcel()">📊 Excel</button>
        <button class="btn btn-sm btn-secondary" id="preview-docx-btn" onclick="downloadPreviewDocx()">📥 Word</button>
        <button class="modal-close" onclick="closePreview()">&times;</button>
      </div>
    </div>
    <div class="modal-body" id="preview-body">
      <div style="text-align:center;padding:40px;color:#8b949e">加载中...</div>
    </div>
  </div>
</div>

<script>
"use strict";

let runId = null;
let polling = null;
let platformsData = [];
let hotData = null;
let hotTab = 'stocks';
let hotTimer = null;
let detectedModels = [];

// -- 初始化 --
async function init() {
  await loadPlatforms();
  await loadAIConfig();
  await loadHotData();
  hotTimer = setInterval(function() { loadHotData(); }, 120000);
}

// -- 热门数据 --
async function loadHotData(force) {
  const grid = document.getElementById('hot-grid');
  const updateEl = document.getElementById('hot-update');
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(function() { controller.abort(); }, 15000);
    const url = force ? '/api/hot?_t=' + Date.now() : '/api/hot';
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    const result = await resp.json();
    if (result.ok && result.data) {
      hotData = result.data;
      const isEmpty = (!hotData.stocks || hotData.stocks.length === 0) && (!hotData.industries || hotData.industries.length === 0);
      if (hotData.stale) {
        // 实时源不可用，已回退缓存/空：用琥珀色提示而非空白报错
        updateEl.textContent = '⚠ ' + (hotData.note || '数据延迟（使用缓存）');
        updateEl.style.color = '#d29922';
      } else {
        updateEl.style.color = '';
      }
      if (isEmpty) {
        if (!hotData.stale) updateEl.textContent = result.data.update_time || '暂无实时数据（非交易时段）';
        grid.innerHTML = '<div style="color:#8b949e;grid-column:span 3;text-align:center;padding:20px">' + (hotData.note || '暂无实时数据') + '<br><small>可手动输入代码分析</small></div>';
      } else {
        renderHot();
      }
    } else {
      updateEl.textContent = '加载失败';
      grid.innerHTML = '<div style="color:#d29922;grid-column:span 3;text-align:center;padding:10px">加载失败，<a href="javascript:loadHotData(true)" style="color:#58a6ff">点击重试</a></div>';
    }
  } catch(e) {
    console.warn('loadHot:', e.name, e.message);
    updateEl.textContent = '网络超时';
    grid.innerHTML = '<div style="color:#d29922;grid-column:span 3;text-align:center;padding:10px">网络超时，<a href="javascript:loadHotData(true)" style="color:#58a6ff">点击重试</a></div>';
  }
}

function switchHotTab(tab, evt) {
  hotTab = tab;
  document.querySelectorAll('.hot-tab').forEach(function(t) { t.classList.remove('active'); });
  if (evt && evt.target) {
    evt.target.classList.add('active');
  } else {
    const el = document.querySelector('.hot-tab[onclick*="' + tab + '"]');
    if (el) el.classList.add('active');
  }
  renderHot();
}

function renderHot() {
  if (!hotData) return;
  const grid = document.getElementById('hot-grid');
  const updateEl = document.getElementById('hot-update');
  updateEl.textContent = '更新时间: ' + (hotData.update_time || '--');

  let items = [];
  if (hotTab === 'stocks') {
    items = hotData.stocks || [];
  } else {
    items = hotData.industries || [];
  }

  if (items.length === 0) {
    grid.innerHTML = '<div style="color:#8b949e;grid-column:span 3;text-align:center;padding:20px">暂无数据（非交易时段或API限流）</div>';
    return;
  }

  grid.innerHTML = items.map(function(item) {
    const change = item.change_pct || 0;
    const cls = change >= 0 ? 'up' : 'down';
    const sign = change >= 0 ? '+' : '';
    let codeStr = '';
    let clickHandler = '';

    if (hotTab === 'stocks') {
      codeStr = '<span class="hot-code">' + item.code + '</span>';
      const safeName = String(item.name || '').replace(/'/g, '');
      clickHandler = "onclick=\"pickHotStock('" + item.code + "','" + safeName + "')\"";
    } else {
      const safeName = String(item.name || '').replace(/'/g, '');
      const topCode = String(item.top_stock_code || '');
      const topName = String(item.top_stock_name || '').replace(/'/g, '');
      clickHandler = "onclick=\"pickHotIndustry('" + safeName + "','" + topCode + "','" + topName + "')\"";
    }

    const tagStr = item.source ? '<span class="hot-tag">' + item.source + '</span>' : '';
    const flowStr = item.net_inflow !== undefined ? ' | ' + item.net_inflow + '亿' : '';
    return '<div class="hot-item" ' + clickHandler + '>' +
      codeStr +
      '<span class="hot-name">' + item.name + '</span>' +
      '<span class="hot-change ' + cls + '">' + sign + change.toFixed(2) + '%' + flowStr + '</span>' +
      tagStr +
    '</div>';
  }).join('');
}

function pickHotStock(code, name) {
  document.getElementById('mode').value = 'single';
  toggleMode();
  document.getElementById('stock_code').value = code;
  document.getElementById('stock_name').value = name;
  resolveStock();
  log('已选择热门股票: ' + name + ' (' + code + ')', 'info');
}

function pickHotIndustry(industryName, topCode, topName) {
  if (topCode) {
    const code = topCode.replace('sh', '').replace('sz', '');
    document.getElementById('mode').value = 'single';
    toggleMode();
    document.getElementById('stock_code').value = code;
    document.getElementById('stock_name').value = topName;
    document.getElementById('stock_industry').value = industryName;
    log('已选择热门行业 [' + industryName + '] 领涨股: ' + topName + ' (' + code + ')', 'info');
  } else {
    document.getElementById('mode').value = 'batch';
    toggleMode();
    log('热门行业: ' + industryName + '，请在批量模式中输入该行业股票代码', 'info');
  }
}

// -- 股票代码解析 --
async function resolveStock() {
  const code = document.getElementById('stock_code').value.trim();
  if (!code) return;
  const resultEl = document.getElementById('resolve-result');
  resultEl.className = 'resolve-result';
  resultEl.textContent = '解析中...';
  try {
    const resp = await fetch('/api/resolve/' + code);
    const data = await resp.json();
    if (data.ok && data.data.name) {
      document.getElementById('stock_name').value = data.data.name;
      document.getElementById('stock_industry').value = data.data.industry || '';
      resultEl.textContent = '✅ ' + data.data.name + ' | 行业: ' + (data.data.industry || '未知') + ' | 一级: ' + (data.data.industry_l1 || '-');
    } else {
      resultEl.className = 'resolve-result error';
      resultEl.textContent = '❌ 未找到该股票';
    }
  } catch(e) {
    resultEl.className = 'resolve-result error';
    resultEl.textContent = '❌ 解析失败: ' + e.message;
  }
}

async function resolveBatch() {
  const text = document.getElementById('batch_config').value;
  let stocks;
  try { stocks = JSON.parse(text); } catch(e) { log('JSON 格式错误', 'fail'); return; }
  log('批量解析 ' + stocks.length + ' 只股票...', 'info');
  for (let s of stocks) {
    if (!s.name) {
      try {
        const resp = await fetch('/api/resolve/' + s.code);
        const data = await resp.json();
        if (data.ok && data.data.name) {
          s.name = data.data.name;
          if (!s.industry) s.industry = data.data.industry || '';
        }
      } catch(e) {}
    }
  }
  document.getElementById('batch_config').value = JSON.stringify(stocks, null, 2);
  log('批量解析完成', 'ok');
}

// -- AI 配置 --
async function loadAIConfig() {
  try {
    const resp = await fetch('/api/ai/config');
    const data = await resp.json();
    document.getElementById('ai_provider').value = data.active_provider;
    const p = data.providers[data.active_provider] || {};

var LOCAL_PROVIDERS = ['ollama', 'lmstudio'];
var DEFAULT_MODELS = {
  ollama: 'qwen3:4b',
  lmstudio: '',
  deepseek: 'deepseek-chat',
  qwen: 'qwen-plus',
  openai: 'gpt-4o-mini',
  zhipu: 'glm-4-flash',
};

function onAIChange() {
  const provider = document.getElementById('ai_provider').value;
  const keyGroup = document.getElementById('ai_key_group');
  const isLocal = LOCAL_PROVIDERS.indexOf(provider) >= 0;
  keyGroup.style.display = isLocal ? 'none' : '';

  // 显示/隐藏模型检测按钮
  const detectBtn = document.getElementById('detect-models-btn');
  const modelSelect = document.getElementById('ai_model_select');
  if (isLocal) {
    detectBtn.style.display = '';
    if (provider === 'lmstudio') {
      document.getElementById('model-hint').textContent = '(点击检测按钮自动发现已加载模型)';
    } else {
      document.getElementById('model-hint').textContent = '(点击检测按钮列出已安装模型)';
    }
  } else {
    detectBtn.style.display = 'none';
    modelSelect.style.display = 'none';
    document.getElementById('model-hint').textContent = '';
  }

  // 更新模型默认值
  const modelEl = document.getElementById('ai_model');
  if (modelEl && !modelEl.dataset.userModified) {
    modelEl.value = DEFAULT_MODELS[provider] || '';
  }
}

async function detectModels() {
  const provider = document.getElementById('ai_provider').value;
  const modelSelect = document.getElementById('ai_model_select');
  const hint = document.getElementById('model-hint');

  hint.textContent = '检测中...';
  modelSelect.style.display = 'none';

  try {
    const resp = await fetch('/api/ai/models/' + provider);
    const data = await resp.json();
    if (data.ok && data.models && data.models.length > 0) {
      detectedModels = data.models;
      modelSelect.innerHTML = '<option value="">-- 选择模型 --</option>' +
        data.models.map(function(m) {
          return '<option value="' + m.id + '">' + m.label + '</option>';
        }).join('');
      modelSelect.style.display = '';
      hint.textContent = '检测到 ' + data.models.length + ' 个模型';

      // 如果当前模型为空，自动选第一个
      const currentModel = document.getElementById('ai_model').value;
      if (!currentModel && data.models.length > 0) {
        document.getElementById('ai_model').value = data.models[0].id;
      }
    } else {
      hint.textContent = '未检测到模型，请确认服务已启动';
      detectedModels = [];
    }
  } catch(e) {
    hint.textContent = '检测失败: ' + e.message;
    detectedModels = [];
  }
}

function selectDetectedModel() {
  const modelSelect = document.getElementById('ai_model_select');
  const selected = modelSelect.value;
  if (selected) {
    document.getElementById('ai_model').value = selected;
    document.getElementById('ai_model').dataset.userModified = '1';
  }
}

async function saveAIConfig() {
  const provider = document.getElementById('ai_provider').value;
  const model = document.getElementById('ai_model').value;
  const apiKey = document.getElementById('ai_key').value;
  const payload = {
    active_provider: provider,
    providers: {}
  };
  payload.providers[provider] = { model: model };
  if (apiKey) payload.providers[provider].api_key = apiKey;
  try {
    await fetch('/api/ai/config', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    log('AI 配置已保存', 'ok');
  } catch(e) { log('保存失败: ' + e.message, 'fail'); }
}

async function testAI() {
  const provider = document.getElementById('ai_provider').value;
  const resultEl = document.getElementById('ai-test-result');
  resultEl.className = 'ai-status pending';
  resultEl.textContent = '测试中...';
  await saveAIConfig();
  try {
    const resp = await fetch('/api/ai/test', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ provider: provider })
    });

      resultEl.className = 'ai-status fail';
      resultEl.textContent = '❌ 失败';
      log('AI 测试失败: ' + (data.error || '未知错误'), 'fail');
    }
  } catch(e) {
    resultEl.className = 'ai-status fail';
    resultEl.textContent = '❌ 错误';
    log('AI 测试异常: ' + e.message, 'fail');

function toggleMode() {
  const mode = document.getElementById('mode').value;

// -- 日志 --
function log(msg, type) {

  const div = document.createElement('div');

// -- 运行分析 --
async function runAnalysis() {
  const mode = document.getElementById('mode').value;
  const useLlm = document.getElementById('use_llm').value === '1';
  const aiProvider = document.getElementById('ai_provider').value;
  const platforms = getSelectedPlatforms();
  const filterEmotion = document.getElementById('filter_emotion').checked;
  const useBrowser = document.getElementById('use_browser').checked;
  const incremental = document.getElementById('incremental_mode').checked;
  const dataOutdir = document.getElementById('data_savepath').value.trim();

  if (platforms.length === 0) { log('请至少选择一个数据源平台', 'fail'); return; }

  let payload = {
    mode: mode, use_llm: useLlm, ai_provider: aiProvider,
    platforms: platforms, filter_emotion: filterEmotion,
    use_browser: useBrowser, incremental: incremental,
  };
  if (dataOutdir) payload.data_outdir = dataOutdir;

  if (mode === 'single') {
    payload.code = document.getElementById('stock_code').value;
    payload.name = document.getElementById('stock_name').value;
    payload.industry = document.getElementById('stock_industry').value;
  } else if (mode === 'batch') {
    try {
      payload.stocks = JSON.parse(document.getElementById('batch_config').value);
    } catch(e) { log('JSON 格式错误: ' + e.message, 'fail'); return; }
  }

  document.getElementById('run-btn').disabled = true;
  document.getElementById('progress-bar-wrap').style.display = '';
  log('启动分析 | AI: ' + aiProvider + ' | 平台: ' + platforms.length + '个 | 情绪过滤: ' + (filterEmotion ? '是' : '否') + ' | 浏览器: ' + (useBrowser ? '是' : '否') + ' | 增量: ' + (incremental ? '是' : '否'), 'info');

  try {
    const resp = await fetch('/api/run', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    if (data.ok) {
      runId = data.run_id;
      log('任务已创建: ' + runId, 'info');
      startPolling();
    } else {
      log('启动失败: ' + data.error, 'fail');
      document.getElementById('run-btn').disabled = false;
    }
  } catch(e) {
    log('请求失败: ' + e.message, 'fail');
    document.getElementById('run-btn').disabled = false;
  }
}

function stopAnalysis() {
  if (runId) {
    fetch('/api/stop/' + runId, {method: 'POST'});
    log('停止请求已发送', 'warn');
  }
}

function startPolling() {
  polling = setInterval(async function() {
    if (!runId) return;
    try {
      const resp = await fetch('/api/status/' + runId);
      const data = await resp.json();
      if (data.total > 0) {
        const pct = (data.done / data.total * 100).toFixed(0);
        document.getElementById('progress-bar').style.width = pct + '%';
      }
      document.getElementById('stat-total').textContent = data.done;
      document.getElementById('stat-success').textContent = data.success;
      document.getElementById('stat-fail').textContent = data.fail;
      document.getElementById('stat-time').textContent = data.elapsed || '0s';

      if (data.logs && data.logs.length > 0) {
        const area = document.getElementById('log-area');
        const existing = area.children.length;
        for (let i = Math.max(0, existing - 1); i < data.logs.length; i++) {
          const div = document.createElement('div');
          div.className = data.logs[i].type || 'info';
          div.textContent = data.logs[i].msg;
          area.appendChild(div);
        }
        area.scrollTop = area.scrollHeight;
      }

      if (data.results && data.results.length > 0) {
        const area = document.getElementById('results-area');
        area.innerHTML = '';
        data.results.forEach(function(r) {
          const div = document.createElement('div');
          div.className = 'result-item';
          let actions = '';
          if (r.code) {
            const safeName = String(r.name || '').replace(/'/g, '');
            actions += ' <a class="file-link" href="javascript:openPreview(\'' + r.code + '\',\'' + safeName + '\')" style="cursor:pointer">👁 预览</a>';
          }
          if (r.docx) {
            actions += ' <a class="file-link" href="/download/' + r.docx + '" download>📥 Word</a>';
          }
          if (r.xlsx) {
            actions += ' <a class="file-link" href="/download/' + r.xlsx + '" download>📊 Excel</a>';
          }
          div.innerHTML = '<span class="name">' + r.name + ' (' + r.code + ')</span>' +
            '<span class="status ' + r.status + '">' + (r.status === 'ok' ? '✅ 完成' : r.status === 'fail' ? '❌ 失败' : '⏳ 进行中') + '</span>' +
            actions;
          area.appendChild(div);
        });
      }

      if (data.status === 'completed' || data.status === 'stopped') {
        clearInterval(polling);
        document.getElementById('run-btn').disabled = false;
        log(data.status === 'completed' ? '✅ 全部完成!' : '⏹ 已停止',
            data.status === 'completed' ? 'ok' : 'warn');
        if (data.zip) {
          const area = document.getElementById('results-area');
          const zipDiv = document.createElement('div');
          zipDiv.style.cssText = 'margin-top:12px; text-align:center; padding:12px; background:#23863620; border-radius:6px';
          zipDiv.innerHTML = '<a class="file-link" href="/download/' + data.zip + '" download style="font-size:16px">📦 下载全部 (' + data.done + ' 份)</a>';
          area.appendChild(zipDiv);
        }
      }
    } catch(e) { console.error('Polling error:', e); }
  }, 1000);
}

function goTab(tab) {
  document.querySelectorAll('.preview-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.preview-section').forEach(function(s) { s.classList.remove('active'); });
  const section = document.getElementById('tab-' + tab);
  if (section) section.classList.add('active');
  document.querySelectorAll('.preview-tab').forEach(function(t) {
    const m = /switchPreviewTab\(['"]?(\w+)/.exec(t.getAttribute('onclick') || '');
    if (m && m[1] === tab) t.classList.add('active');
  });
}

function switchPreviewTab(tab, evt) {
  goTab(tab);
  if (tab === 'technical' && previewCode) {
    loadTechnicalData();
  }
  if (tab === 'quant' && previewCode) {
    loadQuantCredibility();
  }
  if (tab === 'chart' && previewCode) {
    setTimeout(function() { initInteractiveChart(previewCode); }, 0);
  }
}

async function loadQuantCredibility() {
  if (!previewCode) return;
  const loading = document.getElementById('quant-loading');
  const content = document.getElementById('quant-content');
  if (!loading || !content) return;
  loading.style.display = '';
  content.style.display = 'none';
  try {
    const resp = await fetch('/api/credibility/' + previewCode);
    const data = await resp.json();
    if (data.ok) {
      renderQuantCredibility(data);
      content.style.display = '';
      loading.style.display = 'none';
    } else {
      loading.innerHTML = '<div style="color:#f85149">加载失败: ' + (data.error || '未知错误') + '</div>';
    }
  } catch(e) {
    loading.innerHTML = '<div style="color:#f85149">加载失败: ' + e.message + '</div>';
  }
}

function renderQuantCredibility(data) {
  const tf = (data.timeframe_analysis && data.timeframe_analysis.timeframes) || {};
  const comp = data.comprehensive || {};
  const comp_score = comp.comprehensive_score;
  const gc = comp_score >= 70 ? '#3fb950' : (comp_score >= 45 ? '#58a6ff' : '#f85149');
  const align = data.timeframe_analysis ? data.timeframe_analysis.alignment : '';
  let html = '';

  // 综合可信度（量化多周期 × 可信度评估融合）
  html += '<div style="background:#21262d;border-radius:8px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:18px;flex-wrap:wrap">';
  html += '<div style="font-size:40px;font-weight:bold;color:' + gc + '">' + (comp_score != null ? Math.round(comp_score) : '-') + '<span style="font-size:16px;color:#8b949e">/100</span></div>';
  html += '<div style="flex:1;min-width:220px"><div style="font-size:14px;font-weight:bold;color:#58a6ff">综合可信度评分 · ' + (comp.grade || '') + '</div>';
  html += '<div style="font-size:12px;color:#c9d1d9;margin-top:4px;line-height:1.6">' + (comp.explanation || '') + '</div></div>';
  html += '</div>';

  // 三维权重条
  const comps = comp.components || {};
  html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">';
  html += quantBar('内容可信度(D1-D9)', comps.content_credibility, '#58a6ff');
  html += quantBar('量化多周期支持度', comps.quant_support, '#3fb950');
  html += quantBar('周期共振(' + align + ')', comps.alignment_mod != null ? (50 + comps.alignment_mod * 4) : null, '#d29922');
  html += '</div>';

  // 三周期明细表
  html += '<h3 style="font-size:13px;color:#58a6ff;margin:8px 0">📊 多周期动态量化指标（按时间变化动态计算）</h3>';
  html += '<table class="preview-table"><thead><tr><th>周期</th><th>均线趋势</th><th>年化波动率</th><th>量比</th><th>量能趋势</th><th>动量</th><th>信号</th><th>评分</th></tr></thead><tbody>';
  ['day','week','month'].forEach(function(t) {
    const r = tf[t];
    if (!r) return;
    const sc = r.score >= 60 ? '#3fb950' : (r.score <= 40 ? '#f85149' : '#d29922');
    const sig = r.signal;
    const sc2 = sig === '偏多' ? '#3fb950' : (sig === '偏空' ? '#f85149' : '#8b949e');
    const vol = (r.volatility && r.volatility.ann_pct != null) ? r.volatility.ann_pct + '%' : '-';
    const vr = (r.volume_change && r.volume_change.vol_ratio != null) ? r.volume_change.vol_ratio : '-';
    const vt = (r.volume_change && r.volume_change.vol_trend_pct != null) ? (r.volume_change.vol_trend_pct > 0 ? '+' : '') + r.volume_change.vol_trend_pct + '%' : '-';
    const mom = (r.momentum != null) ? (r.momentum > 0 ? '+' : '') + r.momentum + '%' : '-';
    html += '<tr><td>' + (r.label || t) + '</td><td>' + r.ma_trend + '</td><td>' + vol + '</td><td>' + vr + '</td><td>' + vt + '</td><td>' + mom + '</td><td style="color:' + sc2 + '">' + sig + '</td><td style="color:' + sc + ';font-weight:bold">' + (r.score != null ? Math.round(r.score) : '-') + '</td></tr>';
  });
  html += '</tbody></table>';

  const qc = data.timeframe_analysis ? data.timeframe_analysis.composite_quant_score : null;
  html += '<div style="margin-top:10px;font-size:12px;color:#8b949e">多周期量化综合评分（月0.5/周0.3/日0.2 加权）：<b style="color:#c9d1d9">' + (qc != null ? qc : '-') + '</b> ｜ 跨周期共振：<b style="color:' + (align.indexOf('多头')>=0?'#3fb950':(align.indexOf('空头')>=0?'#f85149':'#8b949e')) + '">' + align + '</b></div>';

  document.getElementById('quant-content').innerHTML = html;
}

function quantBar(label, val, color) {
  if (val == null) return '';
  const pct = Math.max(0, Math.min(100, val));

// ============================================================
// 交互式 K 线图表 + 实时标注 (M3)
// 数据：/api/kline/<code>  标注：/api/annotations/<code>
// 关联查询：标注↔分段 双向
// ============================================================
let CHART = null;        // 图表几何与数据
let ANNO_MODE = null;     // 'point' | 'range' | null

function esc(s) {
  return (s || '').toString()
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setAnnoMode(mode) {
  ANNO_MODE = (ANNO_MODE === mode) ? null : mode;
  const bp = document.getElementById('btn-anno-point');
  const br = document.getElementById('btn-anno-range');
  const hint = document.getElementById('anno-hint');
  if (bp) bp.style.background = (ANNO_MODE === 'point') ? '#1f6feb' : '';
  if (br) br.style.background = (ANNO_MODE === 'range') ? '#1f6feb' : '';
  if (hint) hint.textContent = ANNO_MODE
    ? ('当前：' + (ANNO_MODE === 'point' ? '单击曲线添加点标注' : '拖拽选择区间标注') + '（再次点击按钮取消）')
    : '';
}

async function initInteractiveChart(code) {
  const svg = document.getElementById('kline-svg');
  if (!svg) return;
  try {
    const resp = await fetch('/api/kline/' + code + '?_t=' + Date.now());
    const data = await resp.json();
    if (!data.ok) {
      svg.innerHTML = '<text x="20" y="30" fill="#8b949e" font-size="13">无 K 线数据，请先运行分析</text>';
      return;
    }
    const k = data.kline || [];
    if (!k.length) {
      svg.innerHTML = '<text x="20" y="30" fill="#8b949e" font-size="13">K 线为空</text>';
      return;
    }
    const closes = k.map(b => b.close);
    let mn = Math.min.apply(null, closes), mx = Math.max.apply(null, closes);
    const pad = (mx - mn) * 0.08 || 1;
    mn -= pad; mx += pad;
    CHART = {
      kline: k, segments: data.segments || [],
      w: 920, h: 340, padL: 48, padR: 16, padT: 18, padB: 32,
      min: mn, max: mx, n: k.length, dateIdx: {},
    };
    k.forEach((b, i) => { CHART.dateIdx[b.date] = i; });
    drawKlineChart();
    attachChartEvents();
    loadAnnotations(code);
  } catch (e) { /* ignore */ }
}

function drawKlineChart() {
  const c = CHART, k = c.kline;
  const { w, h, padL, padR, padT, padB, min, max, n } = c;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  c.xScale = i => padL + (n <= 1 ? 0 : (i / (n - 1)) * plotW);
  c.yScale = p => padT + (1 - (p - min) / (max - min)) * plotH;
  let s = '';
  const steps = 4;
  for (let g = 0; g <= steps; g++) {
    const yy = padT + g / steps * plotH;
    const val = max - g / steps * (max - min);
    s += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (w - padR) + '" y2="' + yy + '" class="c-grid"/>';
    s += '<text x="' + (padL - 6) + '" y="' + (yy + 3) + '" class="c-ax" text-anchor="end">' + val.toFixed(2) + '</text>';
  }
  // 分段背景带
  c.segments.forEach(seg => {
    const si = c.dateIdx[seg.start_date], ei = c.dateIdx[seg.end_date];
    if (si == null || ei == null) return;
    const x1 = c.xScale(si), x2 = c.xScale(ei);
    const col = seg.direction === '涨' ? 'c-seg-up' : 'c-seg-dn';
    s += '<rect x="' + x1 + '" y="' + padT + '" width="' + Math.max(1, x2 - x1) + '" height="' + plotH + '" class="' + col + '"/>';
  });
  // 价格曲线
  let path = '';
  k.forEach((b, i) => {
    const x = c.xScale(i), y = c.yScale(b.close);
    path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  });
  s += '<path d="' + path + '" class="c-line"/>';
  // 末点
  const lx = c.xScale(n - 1), ly = c.yScale(k[n - 1].close);
  s += '<circle cx="' + lx + '" cy="' + ly + '" r="2.5" class="c-dot"/>';
  // X 轴标签
  const lbls = [0, Math.floor(n / 2), n - 1].filter((v, i, a) => a.indexOf(v) === i);
  lbls.forEach(i => {
    s += '<text x="' + c.xScale(i) + '" y="' + (h - 10) + '" class="c-ax" text-anchor="middle">' + k[i].date.substring(0, 7) + '</text>';
  });
  const svg = document.getElementById('kline-svg');
  if (svg) svg.innerHTML = s;
}

function attachChartEvents() {
  const svg = document.getElementById('kline-svg');
  if (!svg || svg._wired) return;
  svg._wired = true;
  let dragStart = null, dragStartIdx = null, dragging = false, isClick = true, tempBand = null;

  function ptOf(evt) {
    const p = svg.createSVGPoint();
    p.x = evt.clientX; p.y = evt.clientY;
    const ctm = svg.getScreenCTM().inverse();
    const q = p.matrixTransform(ctm);
    return { x: q.x, y: q.y };
  }
  function idxOf(x) {
    const c = CHART, plotW = c.w - c.padL - c.padR;
    let i = Math.round((x - c.padL) / plotW * (c.n - 1));
    return Math.max(0, Math.min(c.n - 1, i));
  }

  svg.addEventListener('mousedown', function (e) {
    if (!ANNO_MODE) return;
    const q = ptOf(e);
    dragStart = q; dragStartIdx = idxOf(q.x); dragging = true; isClick = true;
  });
  svg.addEventListener('mousemove', function (e) {
    const q = ptOf(e), c = CHART, i = idxOf(q.x), b = c.kline[i];
    const tip = document.getElementById('chart-tip');
    if (tip && b) {
      tip.style.display = '';
      tip.style.left = (q.x + 12) + 'px';
      tip.style.top = (q.y + 12) + 'px';
      const pct = i > 0 ? (b.close - c.kline[i - 1].close) / c.kline[i - 1].close * 100 : 0;
      tip.innerHTML = '<b>' + b.date + '</b><br>收盘 ' + b.close + (pct ? (' (' + (pct > 0 ? '+' : '') + pct.toFixed(2) + '%)') : '');
    }
    if (dragging && ANNO_MODE === 'range') {
      if (tempBand) tempBand.remove();
      const x1 = c.xScale(dragStartIdx), x2 = c.xScale(i);
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('x', Math.min(x1, x2)); r.setAttribute('y', c.padT);
      r.setAttribute('width', Math.abs(x2 - x1)); r.setAttribute('height', c.h - c.padT - c.padB);
      r.setAttribute('class', 'c-drag');
      svg.appendChild(r); tempBand = r;
    }
    if (dragging && Math.abs(q.x - (dragStart ? dragStart.x : q.x)) > 4) isClick = false;
  });
  svg.addEventListener('mouseup', function (e) {
    if (!dragging) return;
    const q = ptOf(e), c = CHART, i = idxOf(q.x);
    if (ANNO_MODE === 'point' && isClick) {
      const b = c.kline[i]; addPointAnnotation(b.date, b.close);
    } else if (ANNO_MODE === 'range' && i !== dragStartIdx) {
      const a = c.kline[Math.min(i, dragStartIdx)], z = c.kline[Math.max(i, dragStartIdx)];
      addRangeAnnotation(a.date, z.date);
    }
    if (tempBand) { tempBand.remove(); tempBand = null; }
    dragging = false; dragStart = null;
  });
  svg.addEventListener('mouseleave', function () {
    const tip = document.getElementById('chart-tip');
    if (tip) tip.style.display = 'none';
    if (dragging) { dragging = false; if (tempBand) { tempBand.remove(); tempBand = null; } }
  });
}

function addPointAnnotation(date, price) {
  const label = prompt('点标注：输入标注内容（可留空）', '');
  if (label === null) return;
  fetch('/api/annotations/' + previewCode, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'point', date: date, price: price, label: label, note: '' })
  }).then(r => r.json()).then(d => {
    if (d.ok) loadAnnotations(previewCode); else alert('添加失败：' + (d.error || ''));
  });
}

function addRangeAnnotation(sd, ed) {
  const label = prompt('区间标注：输入标注内容（可留空）', '');
  if (label === null) return;
  fetch('/api/annotations/' + previewCode, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'range', start_date: sd, end_date: ed, label: label, note: '' })
  }).then(r => r.json()).then(d => {
    if (d.ok) loadAnnotations(previewCode); else alert('添加失败：' + (d.error || ''));
  });
}

function deleteAnnotation(code, id) {
  fetch('/api/annotations/' + code, {
    method: 'DELETE', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id })
  }).then(r => r.json()).then(d => { if (d.ok) loadAnnotations(code); else alert('删除失败'); });
}

async function loadAnnotations(code) {
  try {
    const resp = await fetch('/api/annotations/' + code + '?_t=' + Date.now());
    const d = await resp.json();
    if (d.ok) renderAnnotations(d.annotations || []);
  } catch (e) { /* ignore */ }
}

function renderAnnotations(list) {
  const c = CHART; if (!c) return;
  const svg = document.getElementById('kline-svg');
  if (svg) svg.querySelectorAll('.anno-el').forEach(e => e.remove());
  list.forEach(a => {
    if (a.type === 'point') {
      const i = c.dateIdx[a.date]; if (i == null) return;
      const x = c.xScale(i), y = c.yScale(a.price != null ? a.price : c.kline[i].close);
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'anno-el');
      const cir = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      cir.setAttribute('cx', x); cir.setAttribute('cy', y); cir.setAttribute('r', 4);
      cir.setAttribute('class', 'c-anno-pt');
      g.appendChild(cir);
      if (a.label) {
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', x + 6); t.setAttribute('y', y - 6);
        t.setAttribute('class', 'c-anno-tx');
        t.textContent = a.label.substring(0, 12);
        g.appendChild(t);
      }
      svg.appendChild(g);
    } else {
      const si = c.dateIdx[a.start_date], ei = c.dateIdx[a.end_date];
      if (si == null || ei == null) return;
      const x1 = c.xScale(si), x2 = c.xScale(ei);
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('class', 'anno-el');
      r.setAttribute('x', Math.min(x1, x2)); r.setAttribute('y', c.padT);
      r.setAttribute('width', Math.max(2, Math.abs(x2 - x1))); r.setAttribute('height', c.h - c.padT - c.padB);
      r.setAttribute('class', 'c-anno-band');
      svg.appendChild(r);
      if (a.label) {
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('class', 'anno-el');
        t.setAttribute('x', Math.min(x1, x2) + 3); t.setAttribute('y', c.padT + 12);
        t.setAttribute('class', 'c-anno-tx');
        t.textContent = a.label.substring(0, 14);
        svg.appendChild(t);
      }
    }
  });

  const panel = document.getElementById('anno-panel');
  if (!panel) return;
  if (!list.length) {
    panel.innerHTML = '<div style="font-size:11px;color:#8b949e">暂无标注。点击「点标注/区间标注」后在曲线上操作即可添加。</div>';
    return;
  }
  let h = '<div style="font-size:12px;color:#c9d1d9;margin-bottom:6px">📍 实时标注（' + list.length + '）— 点标注 ● / 区间标注 ▭</div>';
  list.forEach(a => {
    const isPt = a.type === 'point';
    const when = isPt ? a.date : (a.start_date + ' ~ ' + a.end_date);
    h += '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px;margin-bottom:6px">';
    h += '  <div style="display:flex;justify-content:space-between;gap:8px">';
    h += '    <span><span style="color:#f0b429">' + (isPt ? '●' : '▭') + '</span> <b>' + esc(a.label || '(无标题)') + '</b></span>';
    h += '    <button class="anno-del" data-del="' + a.id + '" style="background:none;border:1px solid #30363d;color:#8b949e;border-radius:4px;cursor:pointer;font-size:11px">✕</button>';
    h += '  </div>';
    h += '  <div style="font-size:11px;color:#8b949e;margin-top:2px">' + when + (a.price != null ? (' · ' + a.price) : '') + '</div>';
    if (a.note) h += '<div style="font-size:11px;margin-top:2px">' + esc(a.note) + '</div>';
    h += '  <div style="margin-top:4px">';
    h += a.segment_id
      ? ('<span class="anno-seg" data-seg="' + a.segment_id + '" style="display:inline-block;font-size:11px;color:#58a6ff;cursor:pointer">↪ 关联 ' + a.segment_id + '</span>')
      : '<span style="color:#8b949e">未关联分段</span>';
    h += '  </div>';
    h += '</div>';
  });
  panel.innerHTML = h;
  panel.querySelectorAll('.anno-del').forEach(b => b.addEventListener('click', function () {
    if (confirm('确认删除该标注？')) deleteAnnotation(previewCode, b.dataset.del);
  }));
  panel.querySelectorAll('.anno-seg').forEach(el => el.addEventListener('click', function () {
    goTab('segments'); highlightSegmentRow(el.dataset.seg);
  }));
}

  }
}

function highlightSegmentRow(segId) {
  const row = document.getElementById('segrow-' + segId);
  if (!row) return;
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  row.style.transition = 'background .3s';
  row.style.background = 'rgba(88,166,255,0.18)';
  setTimeout(function () { row.style.background = ''; }, 1600);
}

</script>
</body>
